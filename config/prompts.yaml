# config/prompts.yaml

# Layer 3 主题命名
topic_name_generation: |
  你是一位学术专家。请根据以下关键词，为该研究主题生成一个简洁、专业的中文名称（不超过10个字）。

  关键词: {keywords}

  请直接返回主题名称，不要解释。

# 粗分类（第一轮）- 按 arXiv Category 分组
coarse_clustering: |
  你是一位学术分类专家。请将以下研究主题按照学科分类进行分组。

  可用的一级学科类别:
  {categories}

  研究主题列表（每个主题包含ID、关键词、代表性论文标题）:
  {topics}

  请输出分组结果，格式如下:
  - 学科类别: [类别代码]
  - 包含主题: [主题ID列表]
  - 共同特征: [该组主题的共同点，一句话描述]

  注意:
  1. 每个主题只能属于一个主要学科类别
  2. 如果一个主题涉及多个学科，选择最核心的那个
  3. 如果某个类别下主题太少（少于3个），考虑合并到相近类别

# 层次化细分（第二轮）- 构建树结构
build_hierarchy: |
  你是一位学术研究领域的层次结构专家。请为以下同一学科内的研究主题构建层次化的分类结构。

  学科类别: {category}

  研究主题列表:
  {topics}

  任务:
  1. 分析这些主题之间的语义关系，构建树状层次结构（通常3-5层）
  2. 对每一层，确定哪些是父主题（更通用），哪些是子主题（更具体）
  3. 为每个节点选择最具体的语义路径作为"主路径"

  输出格式（JSON）:
  {{
    "levels": [
      {{
        "level": 3,
        "nodes": [
          {{
            "id": "topic_X",
            "name": "主题名称",
            "children": ["topic_Y", "topic_Z"],
            "primary_parent": null  // Layer 3 的父节点是固定的 arXiv Category
          }}
        ]
      }}
    ],
    "cross_links": [
      {{
        "from": "topic_X",
        "to": "topic_Y",
        "relationship": "related",
        "reason": "共享关键词XXX"
      }}
    ]
  }}

  重要规则:
  1. 每个节点只能有一个 primary_parent（主父节点）
  2. 如果主题A和B都可能作为父节点，选择语义上更具体的那个（例如：CNN > 神经网络架构）
  3. 允许跨分支关联（cross_links），但不在树结构中体现

# 跨月主题对齐
topic_alignment: |
  你是一位学术趋势跟踪专家。请判断以下两个研究主题是否是同一个学术概念。

  月份1主题:
  - 名称: {name_1}
  - 关键词: {keywords_1}
  - 代表性论文: {papers_1}

  月份2主题:
  - 名称: {name_2}
  - 关键词: {keywords_2}
  - 代表性论文: {papers_2}

  请分析:
  1. 两个主题的关键词重叠度如何？
  2. 代表性论文的主题是否一致？
  3. 是否存在演化关系（如：主题细化、扩展、转移）？

  输出（JSON）:
  {{
    "is_same_concept": true/false,
    "confidence": 0-1,
    "relationship": "same|evolved|unrelated",
    "reason": "判断理由",
    "suggested_name": "如果需要统一命名，建议的名称"
  }}

# 主题趋势分析
topic_trend_analysis: |
  你是一位研究趋势分析专家。请分析以下研究主题的时间趋势数据。

  主题名称: {topic_name}
  主题关键词: {keywords}
  时间序列数据（近12个月论文数量）:
  {time_series}

  请分析:
  1. 该主题目前处于什么发展阶段（萌芽/快速增长/成熟/衰退）?
  2. 近期有哪些值得关注的进展?
  3. 未来可能的发展方向是什么?

# 研究空白识别
research_gap_identification: |
  你是一位研究机会发现专家。基于以下热门研究主题的分析，识别潜在的研究空白。

  当前热门主题:
  {hot_topics}

  近期新兴主题:
  {emerging_topics}

  请识别:
  1. 热门主题之间有哪些未被充分探索的交叉领域?
  2. 从热门主题到应用落地之间有哪些技术缺口?
  3. 对于想要进入该领域的研究者，有哪些"蓝海"方向?
