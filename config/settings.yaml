# 主题建模配置
topic_modeling:
  min_topic_size: 10
  embedding_model: "all-MiniLM-L6-v2"
  nr_topics: "auto"  # 自动确定主题数量

# LLM 配置
llm:
  provider: "deepseek"
  api_key: ""  # 从环境变量 LLM_API_KEY 读取
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com/v1"
  temperature: 0.3
  max_tokens: 2000

# 流水线配置
pipeline:
  # 层次化配置
  hierarchy:
    coarse_target: 20      # 粗主题目标数量
    fine_max_depth: 6      # 最大深度（Layer 6）
    min_papers_per_topic: 5  # 主题最小论文数
  
  # 跨月对齐配置
  alignment:
    similarity_threshold: 0.7  # 主题相似度阈值
    
  # 数据更新配置
  update:
    frequency: "monthly"
    lookback_months: 12
