<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演化图可视化 - 现代设计预览</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            color: #e8e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* Glassmorphism Header */
        .header {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            padding: 24px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #6b7280;
            font-size: 14px;
            font-weight: 400;
        }

        /* Glassmorphism Controls */
        .controls {
            display: flex;
            gap: 24px;
            padding: 20px 32px;
            background: rgba(20, 20, 35, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.15);
            flex-wrap: wrap;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            font-weight: 600;
        }

        /* Modern segmented control */
        .view-switcher {
            display: flex;
            background: rgba(30, 30, 50, 0.8);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .view-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: #6b7280;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .view-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .view-btn:hover:not(.active) {
            color: #e8e8f0;
            background: rgba(99, 102, 241, 0.1);
        }

        /* Modern category pills */
        .category-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 8px 16px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            background: rgba(30, 30, 50, 0.6);
            color: #9ca3af;
            cursor: pointer;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            border-color: rgba(99, 102, 241, 0.6);
            color: #e8e8f0;
        }

        .category-btn.active {
            border-color: #6366f1;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3) 0%, rgba(139, 92, 246, 0.3) 100%);
            color: white;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        /* Modern slider */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(30, 30, 50, 0.6);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .confidence-slider {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
            border-radius: 2px;
            outline: none;
        }

        .confidence-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .confidence-value {
            font-size: 13px;
            color: #a855f7;
            font-weight: 600;
            min-width: 45px;
            font-family: 'SF Mono', monospace;
        }

        /* Modern legend */
        .legend {
            display: flex;
            gap: 20px;
            margin-left: auto;
            padding: 12px 20px;
            background: rgba(30, 30, 50, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #9ca3af;
            font-weight: 500;
        }

        .legend-glow {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: relative;
        }

        .legend-glow::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(4px);
        }

        .legend-glow.theory { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .legend-glow.theory::after { background: #3b82f6; }
        .legend-glow.method { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .legend-glow.method::after { background: #10b981; }
        .legend-glow.problem { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
        .legend-glow.problem::after { background: #f59e0b; }
        .legend-glow.hybrid { background: #ec4899; box-shadow: 0 0 10px #ec4899; }
        .legend-glow.hybrid::after { background: #ec4899; }

        /* Main content area */
        .main-content {
            padding: 24px 32px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .view-container {
            display: none;
            width: 100%;
            height: calc(100vh - 280px);
            min-height: 600px;
            background: rgba(15, 15, 25, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            overflow: hidden;
            position: relative;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .view-container.active {
            display: block;
        }

        /* Glowing border animation */
        .view-container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(236, 72, 153, 0.3), rgba(99, 102, 241, 0.3));
            border-radius: 20px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .view-container:hover::before {
            opacity: 1;
        }

        /* Modern timeline styling */
        .timeline-svg {
            width: 100%;
            height: 100%;
        }

        .period-column {
            fill: rgba(99, 102, 241, 0.05);
            stroke: rgba(99, 102, 241, 0.1);
            stroke-width: 1;
        }

        .period-label {
            fill: #6b7280;
            font-size: 13px;
            font-weight: 600;
            text-anchor: middle;
            letter-spacing: 1px;
        }

        /* Glowing nodes */
        .topic-node {
            cursor: pointer;
        }

        .topic-node .node-glow {
            fill: none;
            stroke-width: 0;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .topic-node:hover .node-glow {
            opacity: 0.4;
            stroke-width: 8;
        }

        .topic-node .node-core {
            stroke: rgba(15, 15, 25, 0.8);
            stroke-width: 2;
            transition: all 0.3s ease;
        }

        .topic-node:hover .node-core {
            filter: brightness(1.3);
            transform: scale(1.1);
        }

        .topic-node text {
            fill: #e8e8f0;
            font-size: 11px;
            font-weight: 500;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* Gradient edges */
        .evolution-edge {
            fill: none;
            stroke-width: 2;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .evolution-edge.highlighted {
            stroke-width: 3;
            opacity: 1;
            filter: drop-shadow(0 0 8px currentColor);
        }

        /* Animated particles on edges */
        .edge-particle {
            fill: white;
            r: 2;
            opacity: 0;
        }

        /* Modern tooltip */
        .tooltip {
            position: absolute;
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 20px;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(99, 102, 241, 0.1);
            max-width: 320px;
            transform: translateY(10px);
        }

        .tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tooltip-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .tooltip-title {
            font-size: 15px;
            font-weight: 600;
            color: #e8e8f0;
            line-height: 1.4;
        }

        .tooltip-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .tooltip-stat {
            background: rgba(99, 102, 241, 0.1);
            padding: 10px 14px;
            border-radius: 10px;
        }

        .tooltip-stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .tooltip-stat-value {
            font-size: 13px;
            font-weight: 600;
            color: #e8e8f0;
        }

        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .mode-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .mode-badge.theory { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .mode-badge.theory::before { background: #3b82f6; box-shadow: 0 0 6px #3b82f6; }
        .mode-badge.method { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .mode-badge.method::before { background: #10b981; box-shadow: 0 0 6px #10b981; }
        .mode-badge.problem { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .mode-badge.problem::before { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
        .mode-badge.hybrid { background: rgba(236, 72, 153, 0.15); color: #f472b6; }
        .mode-badge.hybrid::before { background: #ec4899; box-shadow: 0 0 6px #ec4899; }

        /* Modern stats bar */
        .stats-bar {
            display: flex;
            gap: 40px;
            padding: 20px 32px;
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(99, 102, 241, 0.2);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'SF Mono', monospace;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
        }

        /* Network view controls */
        .network-period-selector {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            gap: 8px;
            background: rgba(15, 15, 25, 0.8);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .period-select-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: #6b7280;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .period-select-btn:hover {
            color: #e8e8f0;
            background: rgba(99, 102, 241, 0.1);
        }

        .period-select-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }

        .network-controls {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .network-control-btn {
            padding: 10px 18px;
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #9ca3af;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .network-control-btn:hover {
            border-color: rgba(99, 102, 241, 0.6);
            color: #e8e8f0;
            background: rgba(99, 102, 241, 0.1);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 15, 25, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }

        /* Loading animation */
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <h1>🔬 主题演化图谱</h1>
                <p>Topic Evolution Knowledge Graph - Math Domain 2025</p>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <span class="control-label">视图模式</span>
                <div class="view-switcher">
                    <button class="view-btn active" onclick="switchView('timeline')">
                        ◴ 演化时间轴
                    </button>
                    <button class="view-btn" onclick="switchView('network')">
                        ◎ 关系网络
                    </button>
                </div>
            </div>

            <div class="control-group">
                <span class="control-label">学科筛选</span>
                <div class="category-filters">
                    <button class="category-btn active" onclick="toggleCategory(this, 'all')">全部</button>
                    <button class="category-btn" onclick="toggleCategory(this, 'OA')">math.OA</button>
                    <button class="category-btn" onclick="toggleCategory(this, 'NT')">math.NT</button>
                    <button class="category-btn" onclick="toggleCategory(this, 'CO')">math.CO</button>
                    <button class="category-btn" onclick="toggleCategory(this, 'AG')">math.AG</button>
                </div>
            </div>

            <div class="control-group">
                <span class="control-label">置信度阈值</span>
                <div class="slider-container">
                    <input type="range" class="confidence-slider" min="60" max="100" value="80"
                           oninput="updateConfidence(this.value)">
                    <span class="confidence-value">≥0.80</span>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-glow theory"></div>
                    <span>理论</span>
                </div>
                <div class="legend-item">
                    <div class="legend-glow method"></div>
                    <span>方法</span>
                </div>
                <div class="legend-item">
                    <div class="legend-glow problem"></div>
                    <span>问题</span>
                </div>
                <div class="legend-item">
                    <div class="legend-glow hybrid"></div>
                    <span>混合</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div id="timeline-view" class="view-container active">
                <svg class="timeline-svg"></svg>
            </div>
            <div id="network-view" class="view-container">
                <div class="network-period-selector">
                    <button class="period-select-btn active" onclick="switchPeriod('2025-02')">2025-02</button>
                    <button class="period-select-btn" onclick="switchPeriod('2025-03')">2025-03</button>
                    <button class="period-select-btn" onclick="switchPeriod('2025-04')">2025-04</button>
                    <button class="period-select-btn" onclick="switchPeriod('2025-05')">2025-05</button>
                </div>
                <div class="network-controls">
                    <button class="network-control-btn" onclick="togglePhysics()">⚡ 物理引擎</button>
                    <button class="network-control-btn" onclick="resetNetwork()">⟲ 重置视图</button>
                </div>
                <div id="network-container"></div>
            </div>
        </div>

        <div class="tooltip" id="tooltip">
            <div class="tooltip-header">
                <div class="tooltip-icon" id="tooltip-icon">📊</div>
                <div class="tooltip-title" id="tooltip-title">Topic Name</div>
            </div>
            <div class="tooltip-body">
                <div class="tooltip-stat">
                    <div class="tooltip-stat-label">类别</div>
                    <div class="tooltip-stat-value" id="tooltip-category">math.OA</div>
                </div>
                <div class="tooltip-stat">
                    <div class="tooltip-stat-label">模式</div>
                    <div class="tooltip-stat-value" id="tooltip-mode">
                        <span class="mode-badge theory">理论</span>
                    </div>
                </div>
                <div class="tooltip-stat">
                    <div class="tooltip-stat-label">时间</div>
                    <div class="tooltip-stat-value" id="tooltip-period">2025-02</div>
                </div>
                <div class="tooltip-stat">
                    <div class="tooltip-stat-label">论文数</div>
                    <div class="tooltip-stat-value" id="tooltip-papers">42</div>
                </div>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="stat-nodes">156</div>
                <div class="stat-label">活跃节点</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-edges">312</div>
                <div class="stat-label">演化连接</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-components">12</div>
                <div class="stat-label">研究群落</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-coverage">78%</div>
                <div class="stat-label">领域覆盖</div>
            </div>
        </div>
    </div>

    <script>
        // Modern color scheme with glow effects
        const MODE_COLORS = {
            theory: '#3b82f6',
            method: '#10b981',
            problem: '#f59e0b',
            hybrid: '#ec4899'
        };

        const MODE_GRADIENTS = {
            theory: ['#3b82f6', '#60a5fa'],
            method: ['#10b981', '#34d399'],
            problem: ['#f59e0b', '#fbbf24'],
            hybrid: ['#ec4899', '#f472b6']
        };

        const MODE_ICONS = {
            theory: '🔬',
            method: '⚙️',
            problem: '❓',
            hybrid: '🔮'
        };

        const MODE_LABELS = {
            theory: '理论',
            method: '方法',
            problem: '问题',
            hybrid: '混合'
        };

        // Generate enhanced mock data
        const periods = ['2025-02', '2025-03', '2025-04', '2025-05'];
        const categories = ['math.OA', 'math.NT', 'math.CO', 'math.AG'];
        const modes = ['theory', 'method', 'problem', 'hybrid'];

        const topicNames = [
            'AW代数与希尔伯特代数', '迹态代数结构', '扭曲平展群胚代数',
            '非交换代数Fell丛', 'p进伽罗瓦表示理论', '多项式与杜奇序列',
            '随机矩阵谱理论', '量子纠错码', '椭圆曲线密码学',
            '代数K理论', '同调镜像对称', '稳定性条件',
            '模形式与L函数', '丢番图逼近', '算术几何',
            '图论极值问题', '组合设计理论', '概率方法',
            '微分几何流', '度量空间嵌入', '黎曼几何',
            '算子代数结构', '非交换几何', '遍历理论',
            '表示论', '李群李代数', '代数拓扑'
        ];

        function generateMockData() {
            const nodes = [];
            const edges = [];
            const topicMap = {};

            let nodeId = 0;
            topicNames.forEach((name, idx) => {
                const category = categories[Math.floor(Math.random() * categories.length)];
                const mode = modes[Math.floor(Math.random() * modes.length)];
                const startPeriod = Math.floor(Math.random() * 2);
                const endPeriod = Math.min(startPeriod + 2 + Math.floor(Math.random() * 2), 3);

                topicMap[idx] = [];

                for (let p = startPeriod; p <= endPeriod; p++) {
                    const node = {
                        id: `node_${nodeId++}`,
                        topicId: `global_${idx}`,
                        name: name,
                        period: periods[p],
                        periodIndex: p,
                        category: category,
                        mode: mode,
                        paperCount: Math.floor(Math.random() * 100) + 1
                    };
                    nodes.push(node);
                    topicMap[idx].push(node);
                }
            });

            // Generate continued edges
            Object.values(topicMap).forEach(topicNodes => {
                for (let i = 0; i < topicNodes.length - 1; i++) {
                    edges.push({
                        source: topicNodes[i].id,
                        target: topicNodes[i + 1].id,
                        type: 'continued',
                        confidence: 1.0
                    });
                }
            });

            // Generate cross-topic edges
            nodes.forEach((node) => {
                const samePeriod = nodes.filter(n => n.period === node.period && n.id !== node.id);
                const numEdges = Math.floor(Math.random() * 3);
                for (let j = 0; j < numEdges && j < samePeriod.length; j++) {
                    if (Math.random() > 0.5) {
                        edges.push({
                            source: node.id,
                            target: samePeriod[j].id,
                            type: 'diffused',
                            confidence: 0.6 + Math.random() * 0.4
                        });
                    }
                }
            });

            return { nodes, edges };
        }

        const mockData = generateMockData();

        // State
        let currentView = 'timeline';
        let selectedCategories = new Set(['all']);
        let confidenceThreshold = 0.8;
        let networkInstance = null;
        let currentPeriod = '2025-02';

        // View switching
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.view-container').forEach(c => c.classList.remove('active'));

            event.target.closest('.view-btn').classList.add('active');
            document.getElementById(`${view}-view`).classList.add('active');

            if (view === 'network' && !networkInstance) {
                initNetworkView();
            }
        }

        function toggleCategory(btn, category) {
            if (category === 'all') {
                selectedCategories = new Set(['all']);
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            } else {
                selectedCategories.delete('all');
                document.querySelector('.category-btn:first-child').classList.remove('active');

                if (selectedCategories.has(category)) {
                    selectedCategories.delete(category);
                    btn.classList.remove('active');
                } else {
                    selectedCategories.add(category);
                    btn.classList.add('active');
                }

                if (selectedCategories.size === 0) {
                    selectedCategories.add('all');
                    document.querySelector('.category-btn:first-child').classList.add('active');
                }
            }
            updateVisualization();
        }

        function updateConfidence(value) {
            confidenceThreshold = value / 100;
            document.querySelector('.confidence-value').textContent = `≥${confidenceThreshold.toFixed(2)}`;
            updateVisualization();
        }

        function getFilteredData() {
            let filteredNodes = mockData.nodes;

            if (!selectedCategories.has('all')) {
                filteredNodes = filteredNodes.filter(n => {
                    const cat = n.category.split('.')[1];
                    return selectedCategories.has(cat);
                });
            }

            const nodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredEdges = mockData.edges.filter(e => {
                return nodeIds.has(e.source) && nodeIds.has(e.target) &&
                       e.confidence >= confidenceThreshold;
            });

            return { nodes: filteredNodes, edges: filteredEdges };
        }

        function updateVisualization() {
            if (currentView === 'timeline') {
                renderTimeline();
            } else {
                updateNetwork();
            }
            updateStats();
        }

        function updateStats() {
            const { nodes, edges } = getFilteredData();
            document.getElementById('stat-nodes').textContent = nodes.length;
            document.getElementById('stat-edges').textContent = edges.length;

            const adjacency = {};
            nodes.forEach(n => adjacency[n.id] = []);
            edges.forEach(e => {
                if (adjacency[e.source]) adjacency[e.source].push(e.target);
                if (adjacency[e.target]) adjacency[e.target].push(e.source);
            });

            const visited = new Set();
            let components = 0;
            nodes.forEach(n => {
                if (!visited.has(n.id)) {
                    components++;
                    const stack = [n.id];
                    while (stack.length) {
                        const curr = stack.pop();
                        if (!visited.has(curr)) {
                            visited.add(curr);
                            (adjacency[curr] || []).forEach(neighbor => {
                                if (!visited.has(neighbor)) stack.push(neighbor);
                            });
                        }
                    }
                }
            });

            document.getElementById('stat-components').textContent = components;
            document.getElementById('stat-coverage').textContent =
                Math.round((nodes.length / mockData.nodes.length) * 100) + '%';
        }

        // Define gradients
        function defineGradients(svg) {
            const defs = svg.append('defs');

            Object.entries(MODE_GRADIENTS).forEach(([mode, [start, end]]) => {
                const grad = defs.append('linearGradient')
                    .attr('id', `gradient-${mode}`)
                    .attr('x1', '0%')
                    .attr('y1', '0%')
                    .attr('x2', '100%')
                    .attr('y2', '100%');

                grad.append('stop').attr('offset', '0%').attr('stop-color', start);
                grad.append('stop').attr('offset', '100%').attr('stop-color', end);
            });

            // Glow filter
            const filter = defs.append('filter')
                .attr('id', 'glow')
                .attr('x', '-50%')
                .attr('y', '-50%')
                .attr('width', '200%')
                .attr('height', '200%');

            filter.append('feGaussianBlur')
                .attr('stdDeviation', '4')
                .attr('result', 'coloredBlur');

            filter.append('feMerge')
                .append('feMergeNode')
                .attr('in', 'coloredBlur');
            filter.append('feMerge')
                .append('feMergeNode')
                .attr('in', 'SourceGraphic');
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-view');
            const svg = d3.select('.timeline-svg');
            svg.selectAll('*').remove();

            const { width, height } = container.getBoundingClientRect();
            svg.attr('width', width).attr('height', height);

            defineGradients(svg);

            const { nodes, edges } = getFilteredData();
            const margin = { top: 80, right: 60, bottom: 60, left: 60 };
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;

            const g = svg.append('g')
                .attr('transform', `translate(${margin.left},${margin.top})`);

            // Period columns
            const periodWidth = innerWidth / periods.length;

            periods.forEach((period, i) => {
                const x = i * periodWidth;

                g.append('rect')
                    .attr('class', 'period-column')
                    .attr('x', x)
                    .attr('y', -50)
                    .attr('width', periodWidth - 20)
                    .attr('height', innerHeight + 50)
                    .attr('rx', 12);

                g.append('text')
                    .attr('class', 'period-label')
                    .attr('x', x + periodWidth / 2 - 10)
                    .attr('y', -20)
                    .text(period);
            });

            // Position nodes
            const nodesByPeriod = {};
            periods.forEach(p => nodesByPeriod[p] = []);
            nodes.forEach(n => {
                if (nodesByPeriod[n.period]) {
                    nodesByPeriod[n.period].push(n);
                }
            });

            Object.values(nodesByPeriod).forEach(periodNodes => {
                periodNodes.forEach((n, i) => {
                    n.x = periods.indexOf(n.period) * periodWidth + periodWidth / 2 - 10;
                    n.y = (i + 1) * (innerHeight / (periodNodes.length + 1));
                });
            });

            // Draw gradient edges
            const edgeGroup = g.append('g').attr('class', 'edges');

            edges.filter(e => e.type === 'continued').forEach(edge => {
                const source = nodes.find(n => n.id === edge.source);
                const target = nodes.find(n => n.id === edge.target);
                if (source && target) {
                    const path = d3.path();
                    path.moveTo(source.x, source.y);
                    path.bezierCurveTo(
                        source.x + periodWidth / 3, source.y,
                        target.x - periodWidth / 3, target.y,
                        target.x, target.y
                    );

                    edgeGroup.append('path')
                        .attr('class', 'evolution-edge')
                        .attr('d', path.toString())
                        .attr('stroke', `url(#gradient-${source.mode})`)
                        .attr('id', `edge-${edge.source}-${edge.target}`);
                }
            });

            // Draw glowing nodes
            const nodeGroup = g.append('g').attr('class', 'nodes');

            const nodeEnter = nodeGroup.selectAll('.topic-node')
                .data(nodes)
                .enter()
                .append('g')
                .attr('class', 'topic-node')
                .attr('transform', d => `translate(${d.x},${d.y})`)
                .on('mouseover', function(event, d) {
                    showTooltip(event, d);
                    highlightLineage(d);
                })
                .on('mouseout', function() {
                    hideTooltip();
                    unhighlightLineage();
                });

            // Glow effect
            nodeEnter.append('circle')
                .attr('class', 'node-glow')
                .attr('r', d => 12 + Math.log2(d.paperCount + 1) * 2)
                .attr('stroke', d => MODE_COLORS[d.mode]);

            // Core node with gradient
            nodeEnter.append('circle')
                .attr('class', 'node-core')
                .attr('r', d => 8 + Math.log2(d.paperCount + 1) * 2)
                .attr('fill', d => `url(#gradient-${d.mode})`);

            // Labels for larger nodes
            nodeEnter.filter(d => d.paperCount > 20)
                .append('text')
                .attr('dy', 28)
                .text(d => d.name.length > 6 ? d.name.slice(0, 6) + '...' : d.name);
        }

        function highlightLineage(node) {
            const topicEdges = mockData.edges.filter(e =>
                e.source.startsWith(node.topicId) || e.target.startsWith(node.topicId)
            );

            topicEdges.forEach(edge => {
                const edgeEl = document.getElementById(`edge-${edge.source}-${edge.target}`);
                if (edgeEl) edgeEl.classList.add('highlighted');
            });
        }

        function unhighlightLineage() {
            document.querySelectorAll('.evolution-edge').forEach(el => {
                el.classList.remove('highlighted');
            });
        }

        function showTooltip(event, node) {
            const tooltip = document.getElementById('tooltip');

            document.getElementById('tooltip-icon').textContent = MODE_ICONS[node.mode];
            document.getElementById('tooltip-icon').style.background = `linear-gradient(135deg, ${MODE_GRADIENTS[node.mode][0]}33, ${MODE_GRADIENTS[node.mode][1]}33)`;

            document.getElementById('tooltip-title').textContent = node.name;
            document.getElementById('tooltip-category').textContent = node.category;

            const modeBadge = document.getElementById('tooltip-mode').querySelector('.mode-badge');
            modeBadge.textContent = MODE_LABELS[node.mode];
            modeBadge.className = `mode-badge ${node.mode}`;

            document.getElementById('tooltip-period').textContent = node.period;
            document.getElementById('tooltip-papers').textContent = node.paperCount;

            const rect = tooltip.getBoundingClientRect();
            let left = event.pageX + 15;
            let top = event.pageY + 15;

            if (left + rect.width > window.innerWidth) {
                left = event.pageX - rect.width - 15;
            }
            if (top + rect.height > window.innerHeight) {
                top = event.pageY - rect.height - 15;
            }

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        // Network view
        function initNetworkView() {
            updateNetwork();
        }

        function updateNetwork() {
            const container = document.getElementById('network-container');
            const { width, height } = container.getBoundingClientRect();

            const periodNodes = mockData.nodes.filter(n => n.period === currentPeriod);
            const nodeIds = new Set(periodNodes.map(n => n.id));
            const periodEdges = mockData.edges.filter(e =>
                nodeIds.has(e.source) && nodeIds.has(e.target) &&
                e.confidence >= confidenceThreshold &&
                e.type === 'diffused'
            );

            const visNodes = periodNodes.map(n => ({
                id: n.id,
                label: n.name.length > 8 ? n.name.slice(0, 8) + '...' : n.name,
                color: {
                    background: MODE_GRADIENTS[n.mode][0],
                    border: MODE_GRADIENTS[n.mode][1],
                    highlight: { background: MODE_GRADIENTS[n.mode][1], border: '#ffffff' }
                },
                size: 10 + Math.log2(n.paperCount + 1) * 3,
                font: { color: '#e8e8f0', size: 11, face: 'Inter' },
                title: `${n.name}<br/>类别: ${n.category}<br/>模式: ${MODE_LABELS[n.mode]}`,
                shape: 'dot',
                shadow: { enabled: true, color: MODE_COLORS[n.mode], size: 10, x: 0, y: 0 }
            }));

            const visEdges = periodEdges.map(e => ({
                from: e.source,
                to: e.target,
                width: e.confidence * 3,
                color: {
                    color: 'rgba(99, 102, 241, 0.4)',
                    highlight: '#a855f7',
                    hover: '#ec4899'
                },
                smooth: { type: 'continuous' },
                shadow: { enabled: true, color: 'rgba(99, 102, 241, 0.2)', size: 5 }
            }));

            const data = {
                nodes: new vis.DataSet(visNodes),
                edges: new vis.DataSet(visEdges)
            };

            const options = {
                width: width + 'px',
                height: height + 'px',
                backgroundColor: 'transparent',
                physics: {
                    enabled: periodNodes.length <= 300,
                    barnesHut: {
                        gravitationalConstant: -3000,
                        centralGravity: 0.3,
                        springLength: 120,
                        springConstant: 0.05,
                        damping: 0.1
                    }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                    zoomView: true,
                    navigationButtons: true
                },
                nodes: {
                    borderWidth: 2,
                    borderWidthSelected: 3
                }
            };

            if (networkInstance) {
                networkInstance.destroy();
            }

            networkInstance = new vis.Network(container, data, options);
        }

        function switchPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-select-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === period) btn.classList.add('active');
            });
            updateNetwork();
        }

        function togglePhysics() {
            if (networkInstance) {
                const physics = networkInstance.physics.physicsEnabled;
                networkInstance.setOptions({ physics: { enabled: !physics } });
            }
        }

        function resetNetwork() {
            if (networkInstance) {
                networkInstance.fit();
            }
        }

        // Initialize
        window.addEventListener('load', () => {
            renderTimeline();
            updateStats();
        });

        window.addEventListener('resize', () => {
            if (currentView === 'timeline') {
                renderTimeline();
            } else {
                updateNetwork();
            }
        });
    </script>
</body>
</html>
