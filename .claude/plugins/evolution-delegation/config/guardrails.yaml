# Evolution Delegation Guardrails v1.0
# 硬约束：违反则强制阻断
# 软警告：提示但不阻断

hard_blocks:
  - id: "no_cases_no_rule"
    description: "没有正例/负例不得新增规则"
    condition: |
      task_type in ["new_rule", "add_rule"] AND
      (positive_case_hint is empty OR negative_case_hint is empty)
    action: "BLOCK"
    message: |
      阻断：新增规则必须同时提供 positive case 和 negative case。
      请先使用 /case-worker 找到合适的 case pair，再执行规则修改。

  - id: "no_benchmark_no_ready"
    description: "没有 benchmark 不得将规则状态升为 ready"
    condition: |
      status_intent == "upgrade_to_ready" AND
      (benchmark_domain not in registry OR benchmark_status != "exists")
    action: "BLOCK"
    message: |
      阻断：规则状态升级到 ready 必须先有 benchmark。
      请先创建 benchmark spec 并运行通过，再升级状态。

  - id: "level_mismatch"
    description: "不得将 bridge-level 标记为 event-level"
    condition: |
      actual_level == "bridge-level" AND
      claimed_level == "event-level"
    action: "BLOCK"
    message: |
      阻断：bridge-level 不得标记为 event-level。
      只有真正达到 event-level 标准的 case 才能如此标记。

  - id: "out_of_scope_edit"
    description: "不得修改 allowed_files 之外的文件"
    condition: |
      any(modified_file not in allowed_files for modified_file in git_status)
    action: "BLOCK"
    message: |
      阻断：检测到修改了允许范围之外的文件。
      Worker 只能修改 allowed_files 列表中声明的文件。
      请撤销越界修改，或申请扩大 allowed_files 范围。

  - id: "task_marked_complete_without_git_commit"
    description: "任务完成但未创建本地 git commit"
    condition: |
      completion_status == "complete" AND
      git_status shows uncommitted changes
    action: "BLOCK"
    message: |
      阻断：任务标记为完成，但存在未提交的修改。
      请先创建本地 git commit，然后再标记任务完成。

soft_warnings:
  - id: "few_cases"
    description: "benchmark case 数量偏少"
    condition: |
      benchmark_exists AND total_cases < 5
    severity: "warning"
    message: |
      警告：当前 benchmark 只有 {total_cases} 个 case，建议至少补充到 5 个。
      包含：3+ positive, 3+ negative, 1-2 ambiguous

  - id: "review_outdated"
    description: "review 文档与 registry 不一致"
    condition: |
      registry_last_modified > review_last_modified
    severity: "warning"
    message: |
      警告：registry 更新后 review 文档未同步。
      建议运行 /doc-worker 更新 review 文档。

  - id: "synthetic_only"
    description: "只有 synthetic evidence，无真实 case"
    condition: |
      all(case.is_synthetic for case in benchmark_cases)
    severity: "warning"
    message: |
      警告：当前 benchmark 只有 synthetic case。
      建议从实际演化数据中补充真实 case。

  - id: "status_upgrade_without_claude_review"
    description: "尝试升级规则状态但未经过 Claude review"
    condition: |
      status_intent == "upgrade" AND claude_review != "completed"
    severity: "warning"
    message: |
      警告：规则状态升级建议经过 Claude review。
      请在升级前完成 review 流程。

# 字段说明
# - id: 唯一标识符
# - description: 人类可读的描述
# - condition: 触发条件（伪代码表达）
# - action: BLOCK 或 WARN
# - message: 触发时显示的消息
# - severity: 警告级别（仅 soft_warnings）
