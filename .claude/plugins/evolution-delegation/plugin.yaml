# ~/.claude/plugins/evolution-delegation/plugin.yaml
name: "evolution-delegation"
version: "0.1.0"
description: "Structured execution framework for trend-monitor evolution-analysis tasks"
author: "trend-monitor"

entry_points:
  slash_commands:
    - name: "/delegate-evolution"
      skill: "delegate-evolution"
      description: "Entry point for all evolution-analysis tasks"
    - name: "/case-worker"
      skill: "case-worker"
      description: "Find positive/negative/ambiguous cases"
    - name: "/rule-worker"
      skill: "rule-worker"
      description: "Modify rule implementation and tests"
    - name: "/doc-worker"
      skill: "doc-worker"
      description: "Update registry, review, and benchmark docs"

config:
  guardrails_file: "config/guardrails.yaml"
  templates_file: "config/templates.yaml"

  # Benchmark binding configuration
  # Convention: math.{XX} -> make math-{xx}-benchmark
  benchmark:
    convention_pattern: "math.{XX} -> make math-{xx}-benchmark"

    # Supported domains (current)
    # Only these domains have working benchmark runners
    supported_domains:
      - "math_lo"   # make math-lo-benchmark
      - "math_ag"   # make math-ag-benchmark (via math_ag_benchmark.py)

    # Planned: Generic runner for all math domains
    # Status: NOT YET IMPLEMENTED
    # When available, fallback will be:
    #   python3 pipeline/math_benchmark.py --domain {benchmark_domain}
    #
    # Until then, new domains must implement their own runner:
    #   pipeline/math_{xx}_benchmark.py
    # Or extend the generic runner once it exists.
    planned_fallback:
      command: "python3 pipeline/math_benchmark.py --domain {benchmark_domain}"
      status: "planned"
      target_version: "0.2.0"

requirements:
  - "python >= 3.9"
  - "pyyaml"
  - "git"
