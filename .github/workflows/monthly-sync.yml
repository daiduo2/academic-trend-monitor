name: Monthly Topic Sync

on:
  schedule:
    - cron: '30 1 1 * *'
  workflow_dispatch:
    inputs:
      period:
        description: 'Period to sync, e.g. 2026-02. Leave empty to sync all generated periods.'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run monthly pipeline
      run: |
        python pipeline/01_bertopic.py

    - name: Sync topic runs to literature API
      run: |
        if [ -n "${{ github.event.inputs.period }}" ]; then
          python -m pipeline.sync_topic_runs --period "${{ github.event.inputs.period }}"
        else
          python -m pipeline.sync_topic_runs --all
        fi
      env:
        LITERATURE_API_BASE_URL: ${{ secrets.LITERATURE_API_BASE_URL || 'http://ic.nexus.tashan.ac.cn' }}
        LITERATURE_API_TOKEN: ${{ secrets.LITERATURE_API_TOKEN }}
