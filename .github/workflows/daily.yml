# .github/workflows/daily.yml
name: Daily Paper Update

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Skip workflow when DATABASE_URL is not configured
      if: ${{ env.DATABASE_URL == '' }}
      run: echo "DATABASE_URL is not configured; skipping Daily Update."

    - name: Run daily update
      if: ${{ env.DATABASE_URL != '' }}
      run: |
        python -m pipeline.daily_update
      env:
        LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        LITERATURE_API_BASE_URL: ${{ secrets.LITERATURE_API_BASE_URL || 'http://ic.nexus.tashan.ac.cn' }}
        LITERATURE_API_TOKEN: ${{ secrets.LITERATURE_API_TOKEN }}

    - name: Commit and push
      if: ${{ env.DATABASE_URL != '' }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if [ -f data/recent.jsonl ]; then
          git add data/recent.jsonl
        fi
        git diff --staged --quiet || git commit -m "daily: update papers"
        git push
