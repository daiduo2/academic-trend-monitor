name: Claude SDK Smoke

on:
  workflow_dispatch:

jobs:
  sdk-smoke:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --no-dev

      - name: Validate Anthropic-compatible env
        run: |
          set -euo pipefail
          [ -n "${ANTHROPIC_AUTH_TOKEN:-}" ] || { echo "Missing ANTHROPIC_AUTH_TOKEN"; exit 1; }
          [ -n "${ANTHROPIC_BASE_URL:-}" ] || { echo "Missing ANTHROPIC_BASE_URL"; exit 1; }
          [ -n "${ANTHROPIC_MODEL:-}" ] || { echo "Missing ANTHROPIC_MODEL"; exit 1; }
          echo "ANTHROPIC_AUTH_TOKEN=set"
          echo "ANTHROPIC_BASE_URL=set"
          echo "ANTHROPIC_MODEL=set"

      - name: Run Claude SDK smoke test
        run: |
          uv run python - <<'PY'
          import asyncio
          import json
          import os

          if os.getenv("ANTHROPIC_AUTH_TOKEN") and not os.getenv("ANTHROPIC_API_KEY"):
              os.environ["ANTHROPIC_API_KEY"] = os.environ["ANTHROPIC_AUTH_TOKEN"]

          from claude_agent_sdk import AssistantMessage, ClaudeAgentOptions, ResultMessage, TextBlock, query

          async def main():
              chunks = []
              meta = {}
              options = ClaudeAgentOptions(max_turns=2)
              prompt = 'Return strict JSON only: {"ok": true, "source": "claude-sdk"}'

              async for message in query(prompt=prompt, options=options):
                  if isinstance(message, AssistantMessage):
                      for block in getattr(message, "content", []):
                          if isinstance(block, TextBlock):
                              chunks.append(block.text)
                  elif isinstance(message, ResultMessage):
                      meta["session_id"] = getattr(message, "session_id", "")
                      meta["num_turns"] = getattr(message, "num_turns", 0)
                      meta["total_cost_usd"] = getattr(message, "total_cost_usd", 0.0)

              text = "".join(chunks).strip()
              print("SDK_TEXT_START")
              print(text)
              print("SDK_TEXT_END")
              print("SDK_META=" + json.dumps(meta, ensure_ascii=False))

          asyncio.run(main())
          PY
