name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Copy tracked static data
        run: |
          mkdir -p frontend/public/data/output frontend/public/data/weekly frontend/public/data/analysis/daily
          cp data/output/*.json frontend/public/data/ 2>/dev/null || echo "No root json files"
          cp data/output/*.json frontend/public/data/output/ 2>/dev/null || echo "No output json files"
          mkdir -p frontend/public/data/evolution_case_detail
          cp -r data/output/evolution_case_detail/. frontend/public/data/evolution_case_detail/ 2>/dev/null || echo "No evolution case detail files"
          cp data/recent.jsonl frontend/public/data/ 2>/dev/null || echo "No recent file"
          cp -r data/weekly/. frontend/public/data/weekly/ 2>/dev/null || echo "No weekly files"
          cp -r data/analysis/daily/. frontend/public/data/analysis/daily/ 2>/dev/null || echo "No daily analysis files"
          mkdir -p frontend/public/data/output/evolution_graphs
          cp -r data/output/evolution_graphs/. frontend/public/data/output/evolution_graphs/ 2>/dev/null || echo "No evolution_graphs files"
          find frontend/public/data -maxdepth 3 -type f | sort

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
