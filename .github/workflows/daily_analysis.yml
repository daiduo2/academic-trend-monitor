name: Daily Analysis

on:
  workflow_run:
    workflows: ["Daily Fetch"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: daily-analysis-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  daily-analysis:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GH_PUSH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
      CLAUDE_CODE_COMMAND: ${{ vars.CLAUDE_CODE_COMMAND || '' }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ env.GH_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate Anthropic-compatible provider config
        run: |
          set -euo pipefail
          [ -n "${ANTHROPIC_AUTH_TOKEN:-}" ] || { echo "Missing ANTHROPIC_AUTH_TOKEN"; exit 1; }
          [ -n "${ANTHROPIC_BASE_URL:-}" ] || { echo "Missing ANTHROPIC_BASE_URL"; exit 1; }
          [ -n "${ANTHROPIC_MODEL:-}" ] || { echo "Missing ANTHROPIC_MODEL"; exit 1; }

      - name: Generate daily analysis
        run: python3 -m pipeline.daily_generate_analysis

      - name: Export analysis artifacts
        run: python3 -m pipeline.export_analysis_static

      - name: Commit exported analysis
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          [ -d data/analysis ] || exit 0
          git add -A data/analysis/
          git diff --staged --quiet && exit 0
          git commit -m "daily: export analysis"
          for attempt in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}" && git push && exit 0
            git rebase --abort || true
            [ "$attempt" -lt 3 ] || exit 1
            sleep 5
          done
